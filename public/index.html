<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="输入网址，发现并下载网站使用的标签页图标。">
    <meta name="theme-color" content="#10121a">
    <title>Icon Scout - 网站图标提取工具</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Icon Scout 首页">
        <img class="brand-mark" src="/favicon.svg" alt="">
        <span>Icon Scout</span>
      </a>
      <span class="privacy-note">仅支持公开网站</span>
    </header>

    <main>
      <section class="intro">
        <p class="section-label">网站图标提取工具</p>
        <h1>找到网站真正使用的图标</h1>
        <p class="intro-copy">输入网址，自动分析 favicon、Apple Touch Icon 与 Web App Manifest，并推荐最清晰的版本。</p>
        <form id="search-form" class="search-form">
          <label class="sr-only" for="website-url">网站网址</label>
          <div class="input-wrap">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M10.5 13.5a4.24 4.24 0 0 0 6 0l2-2a4.24 4.24 0 0 0-6-6l-1.15 1.15m2.15 3.85a4.24 4.24 0 0 0-6 0l-2 2a4.24 4.24 0 0 0 6 6l1.15-1.15"/></svg>
            <input id="website-url" name="url" type="text" inputmode="url" autocomplete="url" placeholder="例如：github.com" required>
          </div>
          <button class="primary-button" type="submit">
            <span class="button-label">获取网站图标</span>
            <span class="spinner" aria-hidden="true"></span>
          </button>
        </form>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>

      <section id="results" class="results" hidden>
        <div class="result-heading">
          <div>
            <p class="section-label">分析结果</p>
            <h2 id="site-title">网站图标</h2>
          </div>
          <a id="site-link" class="site-link" target="_blank" rel="noopener noreferrer"></a>
        </div>

        <article id="recommended" class="recommended"></article>

        <div class="all-heading">
          <h2>全部候选</h2>
          <span id="candidate-count"></span>
        </div>
        <div id="candidate-grid" class="candidate-grid"></div>
      </section>
    </main>

    <template id="recommended-template">
      <div class="recommended-preview preview-surface"><img alt=""></div>
      <div class="recommended-info">
        <span class="recommend-label">推荐图标</span>
        <h3></h3>
        <p class="icon-url"></p>
        <dl class="meta-list"></dl>
        <div class="actions">
          <label class="format-control">下载格式
            <select class="format-select" aria-label="下载格式">
              <option value="original">原始格式</option>
              <option value="png">PNG</option>
              <option value="jpeg">JPEG</option>
              <option value="webp">WebP</option>
            </select>
          </label>
          <a class="primary-button download-link">下载图标</a>
          <button class="secondary-button copy-button" type="button">复制地址</button>
        </div>
      </div>
    </template>

    <template id="candidate-template">
      <article class="candidate">
        <div class="candidate-preview preview-surface"><img alt=""></div>
        <div class="candidate-body">
          <div class="candidate-top"><strong></strong><span></span></div>
          <p class="icon-url"></p>
          <div class="candidate-actions">
            <select class="format-select" aria-label="下载格式">
              <option value="original">原始</option>
              <option value="png">PNG</option>
              <option value="jpeg">JPEG</option>
              <option value="webp">WebP</option>
            </select>
            <a class="download-link">下载</a>
            <button class="copy-button" type="button">复制地址</button>
          </div>
        </div>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
